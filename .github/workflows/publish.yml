name: Publish
run-name: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'Publish (Nightly)' || format('Publish {0}', github.ref_name) }}
on:
  # For the real release.
  push:
    tags:
      - 'v*' # Runs on pushing version tags
  # For the nightly release.
  schedule:
    - cron: '0 5 * * *'
  # For the nightly release.
  workflow_dispatch: {}

jobs:
  check_date:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: print latest_commit
        run: echo ${{ github.sha }}

      - id: should_run
        continue-on-error: true
        run: |
          commit_count=$(git rev-list --count --after="1 day" ${{ github.sha }})

          if [[ "$commit_count" -gt 0 ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  publish_nightly:
    name: Publish nightly
    needs: check_date
    if: |
      always() &&
      (needs.check_date.result == 'success' || needs.check_date.result == 'skipped') &&
      (
        (github.event_name == 'schedule' && needs.check_date.outputs.should_run != 'false' && github.repository == 'GoogleChrome/lighthouse') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19'
          registry-url: https://registry.npmjs.org/
      - run: yarn --frozen-lockfile
      - run: yarn build-all
      - name: Publish to npm
        run: |
          bash $GITHUB_WORKSPACE/.github/scripts/bump-nightly-version.sh
          npm publish --provenance --access public --registry https://registry.npmjs.org/ --tag next

  publish_release:
    name: Publish release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19'
          registry-url: https://registry.npmjs.org/
      - run: yarn --frozen-lockfile
      - run: yarn build-all
      - name: Publish to npm
        run: |
          npm publish --provenance --access public --registry https://registry.npmjs.org/
