name: Publish nightly
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check_date:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: print latest_commit
        run: echo ${{ github.sha }}

      - id: should_run
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' }}
        run: |
          commit_count=$(git rev-list --count --after="1 day" ${{ github.sha }})

          if [[ "$commit_count" -gt 0 ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  publish:
    # Prevent scheduled job from running if...
    # 1) this is a fork
    # 2) there has not been a change in the last day
    needs: check_date
    if: |
      github.event_name != 'schedule' ||
      (github.repository == 'GoogleChrome/lighthouse' && ${{ needs.check_date.outputs.should_run != 'false' }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.19'
          registry-url: https://registry.npmjs.org/
      - run: yarn --frozen-lockfile
      - run: yarn build-all
      - name: Publish to npm
        run: |
          bash $GITHUB_WORKSPACE/.github/scripts/bump-nightly-version.sh
          npm publish --provenance --access public --registry https://registry.npmjs.org/ --tag next
